<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0b0f19" />
  
  <!-- Outer Silver 'A' / Mountain -->
  <path d="M256 64 L54 440 L120 440 L256 180 L392 440 L458 440 Z" fill="url(#silverGrad)" />
  
  <!-- Car Roof/Windshield -->
  <path d="M180 270 Q 256 240 332 270 L 350 310 Q 256 295 162 310 Z" fill="#18181b" stroke="#dc2626" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Car Body -->
  <path d="M150 310 Q 256 290 362 310 L 380 390 Q 256 370 132 390 Z" fill="#09090b" />
  
  <!-- Headlights -->
  <path d="M155 335 Q 200 345 230 350 L 165 365 Z" fill="#ffffff" filter="url(#glow)"/>
  <path d="M357 335 Q 312 345 282 350 L 347 365 Z" fill="#ffffff" filter="url(#glow)"/>
  
  <!-- Lower Grille Lines -->
  <path d="M170 375 L 210 360 M 342 375 L 302 360" stroke="#a1a1aa" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Red Road -->
  <polygon points="248,390 264,390 268,410 244,410" fill="#dc2626"/>
  <polygon points="242,420 270,420 278,450 234,450" fill="#dc2626"/>
  <polygon points="230,460 282,460 294,512 218,512" fill="#dc2626"/>

  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="40%" stop-color="#cbd5e1" />
      <stop offset="60%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
